name: Sync Back-end to Hugging Face
on:
  push:
    branches: [ main ] # Change to master if your default branch is master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so subtree pushing works seamlessly

      - name: Push Back-end subdirectory to Hugging Face Root
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Налаштування користувача Git
          git config --global user.email "gamlinskijoleg@example.com"
          git config --global user.name "gamlinskijoleg"

          # 2. Додаємо Hugging Face як remote
          git remote add hf https://gamlinskijoleg:$HF_TOKEN@huggingface.co/spaces/gamlinskijoleg/Easyroad

          # 3. Розщеплюємо історію: створюємо локальну тимчасову гілку 'deploy-branch',
          # яка містить ЛИШЕ вміст папки back-end
          git subtree split --prefix back-end -b deploy-branch

          # 4. Робимо ЖОРСТКИЙ пуш цієї тимчасової гілки в гілку main на Hugging Face
          git push hf deploy-branch:main --force
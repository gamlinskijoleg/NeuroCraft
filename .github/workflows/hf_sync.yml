name: Sync Back-end to Hugging Face
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Deploy Back-end to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Встановлюємо та запускаємо LFS у системі раннера
          git lfs install

          # 2. Створюємо тимчасову папку поза межами поточного гіт-проєкту
          mkdir ../hf_deploy

          # 3. Копіюємо ВМІСТ папки back-end у тимчасову папку
          cp -r back-end/* ../hf_deploy/

          # 4. Переходимо в тимчасову папку і робимо з неї абсолютно новий гіт-репозиторій
          cd ../hf_deploy
          git init

          # 5. Налаштовуємо користувача
          git config user.email "gamlinskijoleg@example.com"
          git config user.name "gamlinskijoleg"

          # 6. ОБО'В'ЯЗКОВО налаштовуємо LFS трекінг для ЦЬОГО НОВОГО репозиторію ДО додавання файлів
          git lfs install
          git lfs track "*.pt"
          git lfs track "*.pth"

          # 7. Додаємо всі файли (тепер великі моделі точно індексуються як LFS)
          git add .
          git commit -m "Deploy back-end assets via CI/CD"

          # 8. Пушимо цей чистий репозиторій прямо в main на Hugging Face
          git remote add hf https://gamlinskijoleg:$HF_TOKEN@huggingface.co/spaces/gamlinskijoleg/Easyroad
          git push hf master:main --force  # або main:main, залежно від того, яку дефолтну гілку створить git init (зазвичай master)
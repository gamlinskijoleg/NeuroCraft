services:
  - type: web
    name: neurocraft-backend
    runtime: python
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r back-end/requirements.txt
    startCommand: |
      cd back-end && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8000
    disk:
      name: model_cache
      mountPath: /app/models
      sizeGB: 10
